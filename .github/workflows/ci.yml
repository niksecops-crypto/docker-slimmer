name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - run: go test -v -race -coverprofile=coverage.out ./...
      - uses: codecov/codecov-action@v4
        with:
          files: coverage.out

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  release:
    runs-on: ubuntu-latest
    needs: [test, lint]
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true
      - name: Build release binaries
        run: |
          VERSION=${GITHUB_REF_NAME}
          LDFLAGS="-X main.version=${VERSION} -s -w"
          mkdir dist
          CGO_ENABLED=0 GOOS=linux  GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/slimmer-linux-amd64   ./cmd/slimmer
          CGO_ENABLED=0 GOOS=linux  GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/slimmer-linux-arm64   ./cmd/slimmer
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/slimmer-darwin-amd64  ./cmd/slimmer
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags "${LDFLAGS}" -o dist/slimmer-darwin-arm64  ./cmd/slimmer
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -ldflags "${LDFLAGS}" -o dist/slimmer-windows-amd64.exe ./cmd/slimmer
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
